name: openyolo3d
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip=24.0
  - numpy>=2.0.0
  - pandas
  - tqdm
  - scipy
  - pyyaml
  - scikit-image
  - scikit-learn
  - open3d>=0.19.0
  - trimesh
  - plyfile
  - pyquaternion
  - wandb
  - loguru
  - fire
  - pytorch::pytorch>=2.3.1
  - pytorch::torchvision
  - pytorch::pytorch-cuda=12.1
  - pip:
      - pytorch-lightning>=2.3.0
      - mmcv>=2.1.0
      - mmengine>=0.10.0
      - addict
      - albumentations
      - supervision
      - pyviz3d
      - opencv-python-headless
      - spconv-cu121
      # MinkowskiEngine and other custom extensions might require manual compilation
      # or specific wheels for 3.12/CUDA 12.1
